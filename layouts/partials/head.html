<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ site.Title }}</title>
{{ with .Params.description }}<meta name="description" content="{{ . }}">{{ end }}
<meta name="language" content="es">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{ .Permalink }}">

<meta property="og:type" content="website">
<meta property="og:title" content="{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ site.Title }}">
{{ with .Params.description }}<meta property="og:description" content="{{ . }}">{{ end }}
<meta property="og:locale" content="es_ES">
<meta property="og:site_name" content="{{ site.Title }}">

<link rel="icon" type="image/ico" sizes="32x32" href="{{ "favicon.ico" | relURL }}">
<link rel="stylesheet" href="{{ "css/base_style.css" | relURL }}">
<link rel="stylesheet" href="{{ "css/modulo.css" | relURL }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
